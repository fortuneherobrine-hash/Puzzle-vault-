<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoBlast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffbe0b;
    --neon-green: #06d6a0;
    --neon-purple: #8338ec;
    --bg-dark: #050510;
    --bg-mid: #0a0a2e;
    --panel-bg: rgba(10,10,40,0.95);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    font-family: 'Orbitron', monospace;
    color: white;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ===== MENU SCREEN ===== */
  #menuScreen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 30%, #0d0d3a 0%, #050510 70%);
  }

  .menu-bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 8s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .menu-title {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 0.08em;
    color: white;
    text-shadow:
      0 0 20px var(--neon-cyan),
      0 0 60px var(--neon-cyan),
      0 0 120px rgba(0,245,255,0.3);
    animation: titlePulse 3s ease-in-out infinite;
    position: relative;
    z-index: 1;
    margin-bottom: 10px;
  }

  .menu-subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--neon-cyan);
    opacity: 0.7;
    position: relative;
    z-index: 1;
    margin-bottom: 50px;
    text-transform: uppercase;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px var(--neon-cyan); }
    50% { text-shadow: 0 0 40px var(--neon-cyan), 0 0 100px var(--neon-cyan), 0 0 200px rgba(0,245,255,0.2); }
  }

  .menu-buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    position: relative;
    z-index: 1;
    width: 280px;
  }

  .menu-btn {
    width: 100%;
    padding: 16px 32px;
    border: none;
    cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .menu-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(255,255,255,0.15);
  }

  .menu-btn:hover::before { opacity: 1; }
  .menu-btn:hover { transform: scale(1.04); }
  .menu-btn:active { transform: scale(0.97); }

  .btn-play {
    background: var(--neon-cyan);
    color: #050510;
    font-size: 1.1rem;
    box-shadow: 0 0 30px rgba(0,245,255,0.6), inset 0 1px 0 rgba(255,255,255,0.4);
    animation: playGlow 2s ease-in-out infinite;
  }

  @keyframes playGlow {
    0%, 100% { box-shadow: 0 0 20px rgba(0,245,255,0.5); }
    50% { box-shadow: 0 0 50px rgba(0,245,255,0.9), 0 0 80px rgba(0,245,255,0.3); }
  }

  .btn-level {
    background: transparent;
    color: var(--neon-yellow);
    border: 2px solid var(--neon-yellow);
    box-shadow: 0 0 15px rgba(255,190,11,0.3), inset 0 0 15px rgba(255,190,11,0.05);
  }

  .btn-store {
    background: transparent;
    color: var(--neon-pink);
    border: 2px solid var(--neon-pink);
    box-shadow: 0 0 15px rgba(255,0,110,0.3), inset 0 0 15px rgba(255,0,110,0.05);
  }

  .coins-display {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 0.8rem;
    color: var(--neon-yellow);
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 20;
    background: rgba(255,190,11,0.1);
    border: 1px solid rgba(255,190,11,0.3);
    padding: 8px 14px;
    border-radius: 4px;
  }

  .coin-icon { font-size: 1rem; }

  /* ===== LEVEL MODAL ===== */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--panel-bg);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 8px;
    padding: 36px 40px;
    width: 360px;
    max-width: 95vw;
    box-shadow: 0 0 60px rgba(0,245,255,0.1);
  }

  .modal-title {
    font-size: 1.2rem;
    letter-spacing: 0.2em;
    margin-bottom: 28px;
    text-align: center;
    color: var(--neon-cyan);
  }

  .level-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .level-opt {
    padding: 14px 20px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
  }

  .level-opt.easy { border-color: var(--neon-green); color: var(--neon-green); background: rgba(6,214,160,0.08); }
